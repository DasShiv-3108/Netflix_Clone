name: Docker lint

on:
    workflow_call:

jobs:
    validate_dockerfile:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                dockerfile:
                    - frontend/Dockerfile
                    - backend/Dockerfile

        steps:

            - name: Code Checkout
              uses: actions/checkout@v6

            - name: Validate Dockerfile
              uses: hadolint/hadolint-action@v3.3.0
              with:
                dockerfile: ./${{ matrix.dockerfile }}